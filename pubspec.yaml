name: ecohabitat
description: "Gamification & Environmental Awareness Reserve Tracking Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.1
  logger: ^2.2.0
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  geolocator: ^11.0.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  firebase_core: ^3.13.0
  firebase_auth: ^5.3.1
  firebase_database: ^11.3.10
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  csv: ^6.0.0
  share_plus: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true